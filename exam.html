<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EJU 日本語 전문 리포트 작성용 모의고사 : 목동 일본어 전지혜쌤 · 시험</title>
    <meta name="color-scheme" content="light dark" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="top">
      <div class="container top__inner">
        <div class="top__left">
          <div class="top__kicker">EJU Reading</div>
          <div class="top__title" id="appTitle">—</div>
          <div class="top__sub" id="appSub">—</div>
        </div>

        <div class="top__right">
          <div class="pill" id="examTimer" hidden aria-label="시험 타이머">40:00</div>
          <div class="step">
            <div class="step__dot" aria-hidden="true"></div>
            <div class="step__text" id="stepTag">—</div>
          </div>
          <a class="btn btn--quiet" id="btnGoMain" href="./index.html">메인</a>
        </div>
      </div>
    </header>

    <main class="container shell">
      <div class="sheet">
        <aside class="sheet__meta">
          <div class="metaBox">
            <div class="metaBox__k">진행</div>
            <div class="metaBox__v" id="passageKicker">—</div>
          </div>
          <div class="metaBox">
            <div class="metaBox__k">전체 진행</div>
            <div class="metaBox__v" id="overallProgress">—</div>
          </div>

          <div class="metaBox metaBox--actions">
            <button class="btn btn--danger btn--full" id="btnRestartAllExam" type="button">처음부터 시작(초기화)</button>
          </div>

          <div class="metaBox metaBox--mark">
            <div class="metaBox__k">마킹</div>
            <div class="metaMark" id="markCard" aria-label="문항 마킹"></div>
            <div class="metaMark__legend" aria-hidden="true" hidden>
              <span class="markDot markDot--todo"></span> 미풀이
              <span class="markDot markDot--done"></span> 풀이
              <span class="markDot markDot--ok"></span> 정답
              <span class="markDot markDot--bad"></span> 오답
            </div>
          </div>

          <div class="metaHint">
            채점하면 지문 옆에서 전체 해석을 보면서, 문항에서는 정오/해설을 확인할 수 있어요.
          </div>

        </aside>

        <section class="sheet__main">
          <section class="paperRow" id="passageRow">
            <section class="paper" id="passageCard" aria-labelledby="passageTitle">
              <div class="paper__head">
                <div>
                  <div class="paper__label">지문</div>
                  <h2 class="paper__title" id="passageTitle">—</h2>
                </div>
              </div>
              <article class="paper__body jp" id="passageContent"></article>
            </section>

            <section class="paper paper--aside" id="translationBlock" hidden>
              <div class="paper__head">
                <div>
                  <div class="paper__label">전체 해석</div>
                  <h2 class="paper__title">한국어</h2>
                </div>
                <div class="pill">KO</div>
              </div>
              <article class="paper__translationBody" id="passageTranslation"></article>
            </section>
          </section>

          <section class="paper" id="questionsCard" aria-labelledby="questionsTitle">
            <div class="paper__head paper__head--row">
              <div>
                <div class="paper__label">문항</div>
                <h2 class="paper__title" id="questionsTitle">—</h2>
              </div>
            </div>

            <form id="quizForm" class="qList" autocomplete="off"></form>

            <div class="paper__tools paper__tools--bottom" aria-label="문항 하단 이동">
              <button class="btn btn--primary" id="btnGrade" type="button">중간채점</button>
              <button class="btn" id="btnRetry" type="button">다시풀기</button>
              <button class="btn" id="btnPrev" type="button">이전</button>
              <button class="btn" id="btnNext" type="button">다음</button>
              <button class="btn btn--primary" id="btnFinish" type="button">최종분석으로</button>
            </div>
          </section>
        </section>
      </div>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
