<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EJU 일본어 독해 · 단어시험</title>
    <meta name="color-scheme" content="light dark" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="top">
      <div class="container top__inner">
        <div class="top__left">
          <div class="top__kicker">EJU Reading</div>
          <div class="top__title" id="appTitle">—</div>
          <div class="top__sub" id="appSub">—</div>
        </div>

        <div class="top__right">
          <div class="step">
            <div class="step__dot" aria-hidden="true"></div>
            <div class="step__text" id="stepTag">—</div>
          </div>
          <a class="btn btn--quiet" id="btnBackToVocab" href="./vocab.html?mock=1">단어장</a>
          <a class="btn btn--quiet" href="./index.html">메인</a>
        </div>
      </div>
    </header>

    <main class="container shell" id="vocabQuizApp">
      <section class="paper">
        <div class="paper__head paper__head--row">
          <div>
            <div class="paper__label">단어시험</div>
            <h2 class="paper__title" id="vocabQuizTitle">—</h2>
          </div>
          <div class="paper__tools">
            <button class="btn" id="btnNewSet" type="button">새 세트(15문항)</button>
            <button class="btn btn--primary" id="btnGradeSetTop" type="button">채점</button>
            <button class="btn btn--quiet" id="btnResetVocab" type="button">기록 초기화</button>
          </div>
        </div>

        <section class="quiz">
          <div class="quiz__top">
            <div class="quiz__meta" id="setMeta">—</div>
            <div class="quiz__meta" id="setHint">각 문항에서 <strong>읽기</strong>와 <strong>뜻</strong>을 모두 고른 뒤, 마지막에 한 번에 채점하세요.</div>
          </div>

          <div class="setResult" id="setResult" hidden></div>

          <form id="setForm" class="setList" autocomplete="off"></form>

          <div class="setActions" id="setActions">
            <button class="btn btn--primary" id="btnGradeSetBottom" type="button">채점</button>
          </div>
        </section>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
